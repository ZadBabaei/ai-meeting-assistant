services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meeting_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/meeting_assistant
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: "3001"
      NODE_ENV: production
    depends_on:
      - db

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
